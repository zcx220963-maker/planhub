<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>planHub - 我的计划</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #f8fafc;
            --accent: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
            --sidebar-bg: #1e293b;
            --card-bg: white;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--secondary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Layout */
        .dashboard-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            color: white;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .nav-menu {
            padding: 24px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--primary);
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .user-profile {
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 24px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            max-width: 400px;
        }

        .search-input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            font-size: 1rem;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 16px;
        }

        .filter-tab {
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-tab:hover {
            background: var(--secondary);
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        /* Plans Grid */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .plan-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
        }

        .plan-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px var(--shadow);
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .plan-title {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .plan-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active {
            background: var(--success);
            color: white;
        }

        .status-pending {
            background: var(--warning);
            color: white;
        }

        .status-completed {
            background: var(--text-secondary);
            color: white;
        }

        .plan-progress {
            margin: 16px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--secondary);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .plan-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .plan-deadline {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .plan-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--border);
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 4px var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            .main-content {
                margin-left: 240px;
                padding: 16px;
            }
            .plans-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <h1>planHub</h1>
        </div>

        <nav class="nav-menu">
            <div class="nav-item">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </div>
            <div class="nav-item active">
                <i class="fas fa-calendar-check"></i>
                <span>我的计划</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-users"></i>
                <span>社区</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-search"></i>
                <span>搜索</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user-circle"></i>
                <span>个人中心</span>
            </div>
        </nav>

        <div class="user-profile">
            <div class="user-info">
                <div class="avatar">张</div>
                <div>
                    <div style="font-weight: 600;">张三</div>
                    <div style="color: #94a3b8; font-size: 0.9rem;">zhang@example.com</div>
                </div>
            </div>
            <button class="btn" style="margin-top: 16px; background: transparent; border: 2px solid rgba(255,255,255,0.2); color: white; width: 100%; padding: 10px;">
                <i class="fas fa-sign-out-alt"></i>
                退出登录
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1 class="page-title">我的计划</h1>
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="搜索计划...">
                <button class="btn btn-primary">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-number">12</div>
                <div class="stat-label">总计划数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">8</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">3</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">92%</div>
                <div class="stat-label">完成率</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <div class="filter-tab active">全部</div>
            <div class="filter-tab">进行中</div>
            <div class="filter-tab">待开始</div>
            <div class="filter-tab">已完成</div>
            <div class="filter-tab">已暂停</div>
        </div>

        <!-- Plans Grid -->
        <div class="plans-grid">
            <!-- Plan Card 1 -->
            <div class="plan-card">
                <div class="plan-header">
                    <h3 class="plan-title">学习 React 高级特性</h3>
                    <span class="plan-status status-active">进行中</span>
                </div>
                <div class="plan-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 75%"></div>
                    </div>
                    <div class="progress-text">75% 完成 (第3周/第4周)</div>
                </div>
                <div class="plan-meta">
                    <div class="plan-deadline">
                        <i class="fas fa-calendar"></i>
                        <span>截止：2024年1月15日</span>
                    </div>
                    <div class="plan-actions">
                        <button class="action-btn">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-chart-line"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Plan Card 2 -->
            <div class="plan-card">
                <div class="plan-header">
                    <h3 class="plan-title">准备技术分享会</h3>
                    <span class="plan-status status-pending">待开始</span>
                </div>
                <div class="plan-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text">未开始</div>
                </div>
                <div class="plan-meta">
                    <div class="plan-deadline">
                        <i class="fas fa-calendar"></i>
                        <span>截止：2024年1月20日</span>
                    </div>
                    <div class="plan-actions">
                        <button class="action-btn">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Plan Card 3 -->
            <div class="plan-card">
                <div class="plan-header">
                    <h3 class="plan-title">健身打卡 30 天</h3>
                    <span class="plan-status status-active">进行中</span>
                </div>
                <div class="plan-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 60%"></div>
                    </div>
                    <div class="progress-text">60% 完成 (第18天/第30天)</div>
                </div>
                <div class="plan-meta">
                    <div class="plan-deadline">
                        <i class="fas fa-calendar"></i>
                        <span>截止：2024年2月1日</span>
                    </div>
                    <div class="plan-actions">
                        <button class="action-btn">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-chart-line"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Plan Card 4 -->
            <div class="plan-card">
                <div class="plan-header">
                    <h3 class="plan-title">阅读《深度工作》</h3>
                    <span class="plan-status status-completed">已完成</span>
                </div>
                <div class="plan-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 100%"></div>
                    </div>
                    <div class="progress-text">100% 完成</div>
                </div>
                <div class="plan-meta">
                    <div class="plan-deadline">
                        <i class="fas fa-calendar"></i>
                        <span>完成于：2023年12月15日</span>
                    </div>
                    <div class="plan-actions">
                        <button class="action-btn">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-star"></i>
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-share"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State (if no plans) -->
        <!--
        <div class="empty-state">
            <i class="fas fa-calendar-plus"></i>
            <h3>还没有计划</h3>
            <p>创建您的第一个计划，开始追踪目标进度！</p>
            <button class="btn btn-primary">
                <i class="fas fa-plus" style="margin-right: 8px;"></i>
                创建计划
            </button>
        </div>
        -->
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Filter tabs functionality
        const filterTabs = document.querySelectorAll('.filter-tab');
        const planCards = document.querySelectorAll('.plan-card');

        filterTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                // Remove active class from all tabs
                filterTabs.forEach(t => t.classList.remove('active'));
                // Add active class to clicked tab
                this.classList.add('active');

                const filter = this.textContent.trim();

                planCards.forEach(card => {
                    if (filter === '全部') {
                        card.style.display = 'block';
                    } else {
                        const statusElement = card.querySelector('.plan-status');
                        const status = statusElement ? statusElement.textContent.trim() : '';
                        if (status === filter) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    }
                });
            });
        });

        // Search functionality
        const searchInput = document.querySelector('.search-input');
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const searchTerm = this.value.toLowerCase();
                planCards.forEach(card => {
                    const title = card.querySelector('.plan-title').textContent.toLowerCase();
                    if (title.includes(searchTerm)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }
        });

        // Hover effects for plan cards
        planCards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-4px)';
                card.style.boxShadow = '0 8px 25px var(--shadow)';
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
                card.style.boxShadow = '0 4px 6px var(--shadow)';
            });
        });
    });
</script>

</body>
</html>
